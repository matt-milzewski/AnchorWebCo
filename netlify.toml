[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

[[redirects]]
  from = "/admin.html"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/blog.html"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/blog/welcome-to-our-blog"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/blog/welcome-to-our-blog/"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/blog/welcome-to-our-blog.html"
  to = "/blog/"
  status = 301

[[redirects]]
  from = "/blog-brisbane-seo"
  to = "/blog/brisbane-business-seo/"
  status = 301

[[redirects]]
  from = "/blog-brisbane-seo.html"
  to = "/blog/brisbane-business-seo/"
  status = 301

[[redirects]]
  from = "/blog-google-my-business"
  to = "/blog/google-my-business-optimization/"
  status = 301

[[redirects]]
  from = "/blog-google-my-business.html"
  to = "/blog/google-my-business-optimization/"
  status = 301

[[redirects]]
  from = "/blog-website-speed"
  to = "/blog/website-speed-optimization/"
  status = 301

[[redirects]]
  from = "/blog-website-speed.html"
  to = "/blog/website-speed-optimization/"
  status = 301

[[redirects]]
  from = "/blog-:slug"
  to = "/blog/:slug/"
  status = 301

[[redirects]]
  from = "/blog-:slug.html"
  to = "/blog/:slug/"
  status = 301

[[redirects]]
  from = "/blog"
  to = "/blog/index.html"
  status = 200
  force = true
