name: Deploy to AWS S3

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync _site/ s3://anchorweb.co \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "health-check/*" \
            --exclude "health-check/**" \
            --exclude "README.md" \
            --exclude "bucket-policy.json" \
            --delete

      - name: Publish CloudFront viewer-request function
        env:
          DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          DIST=$(aws cloudfront get-distribution-config --id "$DISTRIBUTION_ID")
          FUNCTION_ARN=$(echo "$DIST" | jq -r '
            [.DistributionConfig.DefaultCacheBehavior, (.DistributionConfig.CacheBehaviors.Items // [])[]]
            | map(.FunctionAssociations.Items // [])
            | add
            | map(select(.EventType == "viewer-request"))
            | .[0].FunctionARN // empty
          ')
          if [ -z "$FUNCTION_ARN" ]; then
            echo "No viewer-request CloudFront function associated with distribution; skipping."
            exit 0
          fi
          FUNCTION_NAME="${FUNCTION_ARN##*/}"
          echo "Updating CloudFront function: $FUNCTION_NAME"
          DESC=$(aws cloudfront describe-function --name "$FUNCTION_NAME")
          RUNTIME=$(echo "$DESC" | jq -r '.FunctionSummary.FunctionConfig.Runtime')
          ETAG=$(echo "$DESC" | jq -r '.ETag')
          aws cloudfront update-function \
            --name "$FUNCTION_NAME" \
            --if-match "$ETAG" \
            --function-config "Comment=anchor web routing,Runtime=$RUNTIME" \
            --function-code fileb://cloudfront-function.js >/dev/null
          NEW_ETAG=$(aws cloudfront describe-function --name "$FUNCTION_NAME" --query 'ETag' --output text)
          aws cloudfront publish-function --name "$FUNCTION_NAME" --if-match "$NEW_ETAG"
          echo "Published $FUNCTION_NAME."

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
