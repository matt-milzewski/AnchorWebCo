name: Deploy Analytics Infrastructure

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  deploy-analytics:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-2' }}
      ANALYTICS_AWS_REGION: ${{ secrets.AWS_REGION || 'ap-southeast-2' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install analytics dependencies
        working-directory: analytics
        run: npm ci

      - name: Install analytics Lambda dependencies
        working-directory: analytics/lambda
        run: npm ci --omit=dev

      - name: Test analytics
        working-directory: analytics
        run: npm test

      - name: Build and synth
        working-directory: analytics
        run: npm run cdk:synth

      - name: Bootstrap CDK
        working-directory: analytics
        run: npx cdk bootstrap

      - name: Deploy analytics stack
        id: deploy
        working-directory: analytics
        run: |
          npx cdk deploy --require-approval never --outputs-file outputs.json
          INGEST_URL=$(node -e "const o=require('./outputs.json'); console.log(o.AnchorAnalyticsDev.IngestFunctionUrl)")
          SCRIPT_URL=$(node -e "const o=require('./outputs.json'); console.log(o.AnchorAnalyticsDev.TrackingScriptUrl)")
          DASHBOARD_URL=$(node -e "const o=require('./outputs.json'); console.log(o.AnchorAnalyticsDev.DashboardFunctionUrl)")
          echo "ingest_url=$INGEST_URL" >> "$GITHUB_OUTPUT"
          echo "script_url=$SCRIPT_URL" >> "$GITHUB_OUTPUT"
          echo "dashboard_url=$DASHBOARD_URL" >> "$GITHUB_OUTPUT"

      - name: Update repository variables
        env:
          GH_TOKEN: ${{ github.token }}
          INGEST_URL: ${{ steps.deploy.outputs.ingest_url }}
          SCRIPT_URL: ${{ steps.deploy.outputs.script_url }}
          DASHBOARD_URL: ${{ steps.deploy.outputs.dashboard_url }}
        run: |
          gh variable set ANCHOR_ANALYTICS_INGEST_URL --body "$INGEST_URL"
          gh variable set ANCHOR_ANALYTICS_SCRIPT_URL --body "$SCRIPT_URL"
          gh variable set ANCHOR_ANALYTICS_DASHBOARD_URL --body "$DASHBOARD_URL"
