name: Copy Pokemon Drop Radar deploy secrets

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  copy:
    runs-on: ubuntu-latest

    steps:
      - name: Copy AWS deploy secrets to Pokemon Drop Radar
        env:
          GH_TOKEN: ${{ secrets.CMS_GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID_VALUE: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY_VALUE: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION_VALUE: ${{ secrets.AWS_REGION }}
        run: |
          gh secret set AWS_ACCESS_KEY_ID --repo matt-milzewski/pokemon-drop-radar --body "$AWS_ACCESS_KEY_ID_VALUE"
          gh secret set AWS_SECRET_ACCESS_KEY --repo matt-milzewski/pokemon-drop-radar --body "$AWS_SECRET_ACCESS_KEY_VALUE"
          gh secret set AWS_REGION --repo matt-milzewski/pokemon-drop-radar --body "${AWS_REGION_VALUE:-ap-southeast-2}"
