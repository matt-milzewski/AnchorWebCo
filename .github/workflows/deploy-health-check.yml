name: Deploy Health Check Infrastructure

on:
  workflow_dispatch:
    inputs:
      terraform_action:
        description: Run Terraform plan or apply
        required: true
        type: choice
        options:
          - plan
          - apply
        default: apply

jobs:
  deploy-health-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TERRAFORM_DIR: health-check/terraform
      LAMBDA_DIR: health-check/lambda
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_region: ${{ secrets.AWS_REGION }}
      TF_VAR_enable_ses_email: ${{ (secrets.SES_FROM_EMAIL != '' || secrets.SES_SENDER_EMAIL != '') && 'true' || 'false' }}
      TF_VAR_ses_from_email: ${{ secrets.SES_FROM_EMAIL || secrets.SES_SENDER_EMAIL || 'noreply@anchorwebco.com.au' }}
      TF_VAR_lead_notification_email: ${{ secrets.LEAD_NOTIFICATION_EMAIL || secrets.SES_FROM_EMAIL || secrets.SES_SENDER_EMAIL || 'info@anchorwebco.com.au' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY || secrets.GOOGLE_PAGESPEED_API_KEY }}
          SES_FROM_EMAIL: ${{ secrets.SES_FROM_EMAIL || secrets.SES_SENDER_EMAIL }}
        run: |
          missing=0
          for var in AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_REGION PAGESPEED_API_KEY; do
            if [ -z "${!var}" ]; then
              echo "Missing required secret: $var"
              missing=1
            fi
          done
          if [ -z "${SES_FROM_EMAIL}" ]; then
            echo "SES sender secret not found. Continuing with SES disabled for this deploy."
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Lambda dependencies
        working-directory: ${{ env.LAMBDA_DIR }}
        run: npm ci --omit=dev

      - name: Run Lambda checks
        working-directory: ${{ env.LAMBDA_DIR }}
        run: |
          npm run lint
          npm test

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Ensure Terraform backend resources
        id: backend
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          STATE_BUCKET="anchorwebco-tfstate-${ACCOUNT_ID}-${AWS_REGION}"
          LOCK_TABLE="anchorwebco-terraform-locks"
          STATE_KEY="health-check/terraform.tfstate"

          echo "state_bucket=$STATE_BUCKET" >> "$GITHUB_OUTPUT"
          echo "lock_table=$LOCK_TABLE" >> "$GITHUB_OUTPUT"
          echo "state_key=$STATE_KEY" >> "$GITHUB_OUTPUT"

          if aws s3api head-bucket --bucket "$STATE_BUCKET" >/dev/null 2>&1; then
            echo "Terraform state bucket exists: $STATE_BUCKET"
          else
            echo "Creating Terraform state bucket: $STATE_BUCKET"
            if [ "$AWS_REGION" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$STATE_BUCKET"
            else
              aws s3api create-bucket \
                --bucket "$STATE_BUCKET" \
                --region "$AWS_REGION" \
                --create-bucket-configuration "LocationConstraint=$AWS_REGION"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$STATE_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$STATE_BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          if aws dynamodb describe-table --table-name "$LOCK_TABLE" >/dev/null 2>&1; then
            echo "Terraform lock table exists: $LOCK_TABLE"
          else
            echo "Creating Terraform lock table: $LOCK_TABLE"
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
          fi

          aws dynamodb wait table-exists --table-name "$LOCK_TABLE"

      - name: Create backend override
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          cat > zz_backend_override.tf <<'EOF'
          terraform {
            backend "s3" {}
          }
          EOF

      - name: Terraform init
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ steps.backend.outputs.state_bucket }}" \
            -backend-config="key=${{ steps.backend.outputs.state_key }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="dynamodb_table=${{ steps.backend.outputs.lock_table }}" \
            -backend-config="encrypt=true"

      - name: Terraform validate
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Set PageSpeed API key in SSM
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY || secrets.GOOGLE_PAGESPEED_API_KEY }}
        run: |
          aws ssm put-parameter \
            --name "/anchor-web-co/health-check/pagespeed-api-key" \
            --type "SecureString" \
            --value "$PAGESPEED_API_KEY" \
            --overwrite

      - name: Show API endpoint
        if: ${{ github.event.inputs.terraform_action == 'apply' }}
        working-directory: ${{ env.TERRAFORM_DIR }}
        run: |
          echo "Health Check endpoint:"
          terraform output -raw health_check_endpoint
